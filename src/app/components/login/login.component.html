<div class="login-container">
  <mat-card appearance="outlined">
    
    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
      <mat-card-subtitle>Ingresa a tu cuenta de Air-Lace</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="login()" #loginForm="ngForm">
        
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input 
            matInput 
            [(ngModel)]="email" 
            name="email" 
            type="email" 
            required 
            email
            placeholder="ejemplo@correo.com">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input 
            matInput 
            [(ngModel)]="password" 
            name="password" 
            type="password" 
            required>
        </mat-form-field>

        <button 
          mat-flat-button 
          color="primary" 
          type="submit" 
          [disabled]="loginForm.invalid || isLoading">
          {{ isLoading ? 'Iniciando sesión...' : 'Ingresar' }}
        </button>

      </form>
    </mat-card-content>

  </mat-card>
</div>
