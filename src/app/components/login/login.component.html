<div class="login-page-wrapper">

    <!-- Panel de Marca Izuparts -->
    <div class="brand-panel">
        <div class="brand-overlay"></div>
        <div class="brand-content">
            <h1 class="brand-logo">Importadora Izuparts</h1>
            <p class="brand-tagline">Soluciones confiables en repuestos diésel. Asesoría técnica especializada y
                disponibilidad inmediata.</p>
        </div>
    </div>

    <!-- Panel del Formulario -->
    <div class="form-panel">
        <mat-card appearance="outlined" class="login-card">

            <mat-card-header>
                <!-- Logotipo sobre el formulario para reforzar marca -->
                <div class="login-logo-container">
                    <img src="assets/logo-izuparts.png" alt="Izuparts" class="login-logo">
                </div>
                <mat-card-title>Plataforma Técnica</mat-card-title>
                <mat-card-subtitle>Ingresa tus credenciales institucionales para acceder</mat-card-subtitle>
            </mat-card-header>

            <mat-card-content>
                <form (ngSubmit)="login()" #loginForm="ngForm">

                    <mat-form-field appearance="outline" floatLabel="always">
                        <mat-label>Correo Electrónico</mat-label>
                        <input matInput [(ngModel)]="email" name="email" type="email" required email
                            placeholder="usuario@izuparts.com">
                        <mat-icon matSuffix class="field-icon">mail_outline</mat-icon>
                    </mat-form-field>

                    <mat-form-field appearance="outline" floatLabel="always">
                        <mat-label>Contraseña Técnica</mat-label>
                        <input matInput [(ngModel)]="password" name="password" type="password" required
                            placeholder="••••••••"> <mat-icon matSuffix class="field-icon">lock_outline</mat-icon>
                    </mat-form-field>

                    <button mat-flat-button type="submit" class="submit-btn"
                        [disabled]="loginForm.invalid || isLoading">
                        {{ isLoading ? 'Autenticando...' : 'Ingresar al Sistema' }}
                    </button>

                </form>
            </mat-card-content>

        </mat-card>
    </div>

</div>
