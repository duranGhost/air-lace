<div class="login-page-wrapper">
  
  <div class="brand-panel">
    <div class="brand-overlay"></div>
    <div class="brand-content">
      <h1 class="brand-logo">Air-Lace</h1>
      <p class="brand-tagline">La forma inteligente de gestionar y rotar tus imágenes en la nube.</p>
    </div>
  </div>

  <div class="form-panel">
    <mat-card appearance="outlined" class="login-card">
      
      <mat-card-header>
        <mat-card-title>¡Hola de nuevo!</mat-card-title>
        <mat-card-subtitle>Ingresa tus credenciales para acceder</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form (ngSubmit)="login()" #loginForm="ngForm">
          
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input 
              matInput 
              [(ngModel)]="email" 
              name="email" 
              type="email" 
              required 
              email
              placeholder="ejemplo@correo.com">
            <mat-icon matSuffix class="field-icon">mail_outline</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Contraseña</mat-label>
            <input 
              matInput 
              [(ngModel)]="password" 
              name="password" 
              type="password" 
              required>
            <mat-icon matSuffix class="field-icon">lock_outline</mat-icon>
          </mat-form-field>

          <button 
            mat-flat-button 
            color="primary" 
            type="submit" 
            class="submit-btn"
            [disabled]="loginForm.invalid || isLoading">
            {{ isLoading ? 'Iniciando sesión...' : 'Ingresar al Sistema' }}
          </button>

        </form>
      </mat-card-content>

    </mat-card>
  </div>

</div>
